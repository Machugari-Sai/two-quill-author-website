<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register | SAK Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-site">
    <div class="space-bg" aria-hidden="true">
      <div class="stars stars-a"></div>
      <div class="stars stars-b"></div>
      <div class="planet-glow"></div>
      <div class="grid-floor"></div>
    </div>

    <section class="auth-shell">
      <div class="auth-panel auth-copy">
        <span class="auth-kicker">Create Your Pass</span>
        <h1>Register</h1>
        <p>Register once with your email ID and password. After that, logging in unlocks the full SAK Universe website.</p>
        <div class="auth-orbit" aria-hidden="true"><span>R</span></div>
      </div>

      <form class="auth-panel auth-form" data-register-form>
        <h2>Join the Archive</h2>
        <label>
          <span>Name</span>
          <input type="text" name="name" autocomplete="given-name" required placeholder="Your name">
        </label>
        <label>
          <span>Email ID</span>
          <input type="email" name="email" autocomplete="email" required placeholder="you@example.com">
        </label>
        <div class="auth-form-grid">
          <label>
            <span>Gender</span>
            <select name="gender" required>
              <option value="">Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </label>
          <label>
            <span>Age (automatic)</span>
            <input type="number" name="age" readonly placeholder="Select date of birth">
          </label>
        </div>
        <label>
          <span>Date of Birth</span>
          <input type="date" name="dob" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" autocomplete="new-password" required minlength="4" placeholder="Create a secret key">
        </label>
        <button class="auth-submit" type="submit">Create Account</button>
        <p class="auth-status" data-auth-status></p>
        <p class="auth-switch">Already registered? <a href="login.html">Log in now</a></p>
      </form>
    </section>
  </main>
  <script src="auth.js?v=3"></script>
</body>
</html>
