<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login | SAK Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="auth-site">
    <div class="space-bg" aria-hidden="true">
      <div class="stars stars-a"></div>
      <div class="stars stars-b"></div>
      <div class="planet-glow"></div>
      <div class="grid-floor"></div>
    </div>

    <section class="auth-shell">
      <div class="auth-panel auth-copy">
        <span class="auth-kicker">SAK Universe Gate</span>
        <h1>Login Access</h1>
        <p>Only registered users can enter the website. Type your password, and the scanner will show whether each character is correct.</p>
        <div class="auth-orbit" aria-hidden="true"><span>S</span></div>
      </div>

      <form class="auth-panel auth-form" data-login-form>
        <h2>Enter the Universe</h2>
        <label>
          <span>Email ID</span>
          <input data-login-email type="email" name="email" autocomplete="email" required placeholder="you@example.com">
        </label>
        <label>
          <span>Password</span>
          <input data-login-password type="password" name="password" autocomplete="current-password" required placeholder="Your secret key">
        </label>
        <div class="password-report" data-password-report>
          <span class="auth-hint idle">Type your password to scan each character.</span>
        </div>
        <button class="auth-submit" type="submit">Unlock Website</button>
        <p class="auth-status" data-auth-status></p>
        <p class="auth-switch">New to SAK? <a href="register.html">Create account</a></p>
      </form>
    </section>
  </main>
  <script src="auth.js?v=3"></script>
</body>
</html>
