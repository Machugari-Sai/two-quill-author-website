<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1400" role="img" aria-labelledby="title desc">
  <title id="title">SAK The Beginning front cover</title>
  <desc id="desc">A gold and black fantasy book cover for SAK The Beginning by Yashwanth Reddy.</desc>
  <defs>
    <radialGradient id="sky" cx="50%" cy="18%" r="78%">
      <stop offset="0" stop-color="#f1d7af"/>
      <stop offset=".42" stop-color="#927858"/>
      <stop offset=".72" stop-color="#30281f"/>
      <stop offset="1" stop-color="#090806"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe6a0"/>
      <stop offset=".35" stop-color="#b87a20"/>
      <stop offset=".68" stop-color="#fff1bf"/>
      <stop offset="1" stop-color="#8c5317"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="12" flood-color="#000" flood-opacity=".85"/>
    </filter>
  </defs>
  <rect width="900" height="1400" fill="url(#sky)"/>
  <rect x="22" y="22" width="856" height="1356" fill="none" stroke="#c77b22" stroke-width="3"/>
  <rect x="40" y="40" width="820" height="1320" fill="none" stroke="#9a621d" stroke-width="1.5"/>
  <g opacity=".34" fill="#050505">
    <path d="M0 460 C220 390 280 690 450 520 C620 350 710 500 900 410 L900 780 C750 720 650 845 490 750 C320 650 205 800 0 720 Z"/>
    <path d="M-20 930 C160 770 270 1110 430 890 C610 660 760 920 920 760 L920 1400 L-20 1400 Z"/>
  </g>
  <g opacity=".8" fill="#0c0b0a">
    <polygon points="0,1400 0,1040 190,870 325,1400"/>
    <polygon points="900,1400 900,980 705,815 560,1400"/>
    <polygon points="270,1400 440,1030 620,1400"/>
  </g>
  <g opacity=".55" stroke="#f7941d" stroke-width="5" filter="url(#glow)">
    <path d="M55 810 C170 720 220 740 300 650"/>
    <path d="M760 725 C690 650 655 610 610 530"/>
    <path d="M180 1160 C250 1040 360 1070 425 940"/>
    <path d="M735 1120 C650 1040 665 980 610 905"/>
  </g>
  <g transform="translate(450 248)" text-anchor="middle" font-family="Cinzel, Georgia, serif" fill="#17100a">
    <text y="0" font-size="34" letter-spacing="13">EVERY LEGEND HAS</text>
    <text y="48" font-size="34" letter-spacing="13">A BEGINNING.</text>
    <text y="104" font-size="33" letter-spacing="12">THIS IS WHERE IT ALL STARTS.</text>
  </g>
  <g transform="translate(450 346)" stroke="#5d3511" stroke-width="3" fill="none">
    <line x1="-155" y1="0" x2="-35" y2="0"/>
    <line x1="35" y1="0" x2="155" y2="0"/>
    <rect x="-15" y="-15" width="30" height="30" transform="rotate(45)"/>
    <rect x="-6" y="-6" width="12" height="12" transform="rotate(45)"/>
  </g>
  <g filter="url(#shadow)" text-anchor="middle" font-family="Cinzel, Georgia, serif">
    <text x="450" y="695" font-size="300" font-weight="800" fill="url(#gold)" stroke="#4a2c11" stroke-width="3">SAK</text>
  </g>
  <line x1="170" y1="714" x2="730" y2="714" stroke="#ffb43a" stroke-width="5" filter="url(#glow)"/>
  <g text-anchor="middle" font-family="Cinzel, Georgia, serif" fill="#1a120b">
    <text x="450" y="875" font-size="58" letter-spacing="31">THE BEGINNING</text>
  </g>
  <g transform="translate(450 946)" stroke="#5d3511" stroke-width="3" fill="none">
    <line x1="-190" y1="0" x2="-42" y2="0"/>
    <line x1="42" y1="0" x2="190" y2="0"/>
    <rect x="-18" y="-18" width="36" height="36" transform="rotate(45)"/>
    <rect x="-7" y="-7" width="14" height="14" transform="rotate(45)"/>
  </g>
  <g text-anchor="middle" font-family="Cinzel, Georgia, serif" fill="#d9a553">
    <text x="450" y="1298" font-size="56" letter-spacing="22">YASHWANTH REDDY</text>
  </g>
</svg>
